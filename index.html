<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Story — A Love to Remember</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Lato:wght@300;400;700&family=Great+Vibes&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <div class="romance-footer">
    <button id="loveButton" class="heart-btn">
      <span class="icon">❤️</span>
      <span class="text">Для тебе з любов'ю</span>
    </button>
  </div>

  <audio id="romanticMusic" src="music.mp3"></audio>

  <style>
    /* Позиціонування внизу сторінки */
    .romance-footer {
      width: 100%;
      padding: 40px 0;
      display: flex;
      justify-content: center;
      align-items: center;
      position: absolute;
      top: -10px;
      right: -450px;
      z-index: 999;
      /* background: linear-gradient(transparent, #fff0f5); */
      /* Ніжно-рожевий градієнт */
    }

    /* Стиль самої кнопки */
    .heart-btn {
      background-color: #ff4d6d;
      /* Насичений рожевий/червоний */
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      font-family: 'Georgia', serif;
      border-radius: 50px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3);
      transition: all 0.4s ease;
      position: relative;
      overflow: hidden;
    }

    /* Анімація при наведенні */
    .heart-btn:hover {
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 8px 25px rgba(255, 77, 109, 0.5);
      background-color: #ff758f;
    }

    /* Анімація серця всередині */
    .heart-btn .icon {
      display: inline-block;
      animation: heartbeat 1.5s infinite;
    }

    @keyframes heartbeat {
      0% {
        transform: scale(1);
      }

      15% {
        transform: scale(1.3);
      }

      30% {
        transform: scale(1);
      }

      45% {
        transform: scale(1.15);
      }

      60% {
        transform: scale(1);
      }
    }

    /* Ефект натискання */
    .heart-btn:active {
      transform: scale(0.95);
    }
  </style>

  <script>
    const button = document.getElementById('loveButton');
    const audio = document.getElementById('romanticMusic');
    let isPlaying = false;

    button.addEventListener('click', () => {
      if (!isPlaying) {
        audio.play();
        button.querySelector('.text').innerText = "Слухаємо разом...";
        isPlaying = true;
      } else {
        audio.pause();
        button.querySelector('.text').innerText = "Для тебе з любов'ю";
        isPlaying = false;
      }
    });
  </script>
</body>

</html>
